<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <section>
    <div class="inFormBackground">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="inLoginForm">
        <form onsubmit="return false">
          <div class="title">
            <h3>Login</h3>
          </div>
          <div class="inputGroup">
            <label for="email">Email</label><i class="fas fa-user"></i>  
            <input type="email" placeholder="Enter Email" id="email">
          </div>
          <div class="inputGroup">
            <label for="password">Password</label>
            <input type="password" placeholder="Enter Password" id="password">
            <i class="fas fa-eye-slash" id="togglePassword"></i>
          </div>
          <div class="forgot-pass"><a href="#">Forgot Password?</a></div>
          <button class="submitForm">Log In</button>
          <div>Not a Member? <a href="#"><span class="Signup">Sign Up</span></a>
      </div>
      </form>
    </div>
    </div>
  </section>
  <footer>
    <img class="logo" src="logo.png" alt="SAMADHAN logo">
  </footer>
  <script>
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
  
    togglePassword.addEventListener('click', function () {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePassword.classList.remove('fa-eye-slash');
        togglePassword.classList.add('fa-eye');
      } else {
        passwordInput.type = 'password';
        togglePassword.classList.remove('fa-eye');
        togglePassword.classList.add('fa-eye-slash');
      }
    });
  </script>
  
</body>

</html>
